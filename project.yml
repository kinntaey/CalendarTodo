name: CalendarTodo
options:
  bundleIdPrefix: com.calendartodo
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"
  groupSortPosition: top
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"

packages:
  CalendarTodoCore:
    path: CalendarTodoCore

targets:
  CalendarTodo:
    type: application
    platform: [iOS, macOS]
    sources:
      - path: CalendarTodoApp
    dependencies:
      - package: CalendarTodoCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.calendartodo.app
        INFOPLIST_FILE: CalendarTodoApp/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: CalendarTodoApp/Resources/CalendarTodo.entitlements
        PRODUCT_NAME: CalendarTodo
    entitlements:
      path: CalendarTodoApp/Resources/CalendarTodo.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.calendartodo.app

  CalendarTodoWidgets:
    type: app-extension
    platform: [iOS, macOS]
    sources:
      - path: CalendarTodoWidgets
    dependencies:
      - package: CalendarTodoCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.calendartodo.app.widgets
        INFOPLIST_FILE: CalendarTodoWidgets/Info.plist
        PRODUCT_NAME: CalendarTodoWidgets
    entitlements:
      path: CalendarTodoWidgets/CalendarTodoWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.calendartodo.app

schemes:
  CalendarTodo:
    build:
      targets:
        CalendarTodo: all
        CalendarTodoWidgets: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
