name: CalendarTodo
options:
  bundleIdPrefix: com.calendartodo
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"
  groupSortPosition: top
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"

packages:
  CalendarTodoCore:
    path: CalendarTodoCore

targets:
  CalendarTodo-iOS:
    type: application
    platform: iOS
    sources:
      - path: CalendarTodoApp
    dependencies:
      - package: CalendarTodoCore
      - target: CalendarTodoWidgets-iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.calendartodo.app
        INFOPLIST_FILE: CalendarTodoApp/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: CalendarTodoApp/Resources/CalendarTodo.entitlements
        PRODUCT_NAME: CalendarTodo
        SUPPORTS_MACCATALYST: false

  CalendarTodo-macOS:
    type: application
    platform: macOS
    sources:
      - path: CalendarTodoApp
    dependencies:
      - package: CalendarTodoCore
      - target: CalendarTodoWidgets-macOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.calendartodo.app
        INFOPLIST_FILE: CalendarTodoApp/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: CalendarTodoApp/Resources/CalendarTodo.entitlements
        PRODUCT_NAME: CalendarTodo

  CalendarTodoWidgets-iOS:
    type: app-extension
    platform: iOS
    sources:
      - path: CalendarTodoWidgets
    dependencies:
      - package: CalendarTodoCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.calendartodo.app.widgets
        INFOPLIST_FILE: CalendarTodoWidgets/Info.plist
        PRODUCT_NAME: CalendarTodoWidgets
        CODE_SIGN_ENTITLEMENTS: CalendarTodoWidgets/CalendarTodoWidgets.entitlements

  CalendarTodoWidgets-macOS:
    type: app-extension
    platform: macOS
    sources:
      - path: CalendarTodoWidgets
    dependencies:
      - package: CalendarTodoCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.calendartodo.app.widgets
        INFOPLIST_FILE: CalendarTodoWidgets/Info.plist
        PRODUCT_NAME: CalendarTodoWidgets
        CODE_SIGN_ENTITLEMENTS: CalendarTodoWidgets/CalendarTodoWidgets.entitlements

schemes:
  CalendarTodo-iOS:
    build:
      targets:
        CalendarTodo-iOS: all
    run:
      config: Debug
    test:
      config: Debug
    archive:
      config: Release

  CalendarTodo-macOS:
    build:
      targets:
        CalendarTodo-macOS: all
    run:
      config: Debug
    test:
      config: Debug
    archive:
      config: Release
